<!DOCTYPE html> 
<html> 
    <head> 
        <meta charset="utf-8"> 
        <title>VP-LV</title> 
        <script src="https://d3js.org/d3.v3.min.js"></script> 
    </head> 
    <body> 
        <script> 
            var svg=d3.select("body")
            .append("svg")
            .attr("width",500)
            .attr("height",400);

            svg.append("rect")
            .attr("x",0)
            .attr("y",0)
            .attr("width",500)
            .attr("height",300)
            .style("fill","lightblue");

            svg.append("rect")
            .attr("x",0)
            .attr("y",300)
            .attr("width",500)
            .attr("height",100)
            .style("fill","green");

            svg.append("circle")
            .attr("cx",420)
            .attr("cy",60)
            .attr("r",30)
            .style("fill","yellow")
            .style("stroke","orange")
            .style("stroke-width","3px");

            svg.append("ellipse")
            .attr("cx", 90)
            .attr("cy", 70)
            .attr("rx", 35)
            .attr("ry", 20)
            .attr("fill", "white");

            svg.append("ellipse")
            .attr("cx", 120)
            .attr("cy", 80)
            .attr("rx", 35)
            .attr("ry", 20)
            .attr("fill", "white");

            svg.append("rect")
            .attr("x", 150)
            .attr("y", 200)
            .attr("width", 150)
            .attr("height", 100)
            .attr("fill", "peru");

            svg.append("polygon")
            .attr("points", "150,200 225,130 300,200")
            .attr("fill", "darkred");

            svg.append("rect")
            .attr("x", 205)
            .attr("y", 250)
            .attr("width", 40)
            .attr("height", 50)
            .attr("fill", "saddlebrown");

            svg.append("rect")
            .attr("x", 170)
            .attr("y", 220)
            .attr("width", 30)
            .attr("height", 30)
            .attr("fill", "white")
            .attr("stroke", "black");

            svg.append("rect")
            .attr("x", 250)
            .attr("y", 220)
            .attr("width", 30)
            .attr("height", 30)
            .attr("fill", "white")
            .attr("stroke", "black");
        </script> 
    </body> 
</html>

<!--
Pomoću D3.js kreiran je SVG prikaz scene s kućom, travom, suncem i oblacima. 
Korišteni su elementi rect, circle, ellipse i polygon, uz odgovarajuće boje i pozicioniranje elemenata.
-->
