<!DOCTYPE html> 
<html> 
    <head> 
        <meta charset="utf-8"> 
        <title>VP-LV</title> 
        <script src="https://d3js.org/d3.v3.min.js"></script> 
    </head> 
    <body> 
        <script> 
            d3.select("body").append("h1").text("Naslov");

            var div1=d3.select("body").append("div");
            div1.append("h2").text("Podnaslov 1");
            div1.append("p").text("Tekst 1");

            var div2=d3.select("body").append("div");
            div2.append("h2").text("Podnaslov 2");
            div2.append("p").text("Tekst 2");
        </script> 
    </body> 
</html>

<!--
Pomoću D3.js biblioteke u tijelo dokumenta prvo je dodan element h1. 
Nakon toga su dodana dva div elementa, unutar kojih su kreirani elementi h2 i p s pripadajućim tekstom.
 Time je ostvarena tražena struktura HTML dokumenta.
 -->
